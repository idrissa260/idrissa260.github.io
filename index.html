<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CV - Idrissa SALL</title>

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #0f172a, #1e3a8a);
      color: #fff;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .card {
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(10px);
      padding: 40px;
      border-radius: 20px;
      text-align: center;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
      max-width: 400px;
      width: 90%;
    }

    h1 {
      margin-bottom: 10px;
      font-size: 32px;
    }

    p {
      margin-bottom: 30px;
      color: #cbd5f5;
    }

    .btn {
      display: inline-block;
      padding: 15px 25px;
      font-size: 18px;
      color: white;
      text-decoration: none;
      border-radius: 10px;
      background: #3b82f6;
      transition: all 0.3s ease;
    }

    .btn:hover {
      background: #2563eb;
      transform: translateY(-3px);
      box-shadow: 0 5px 15px rgba(0,0,0,0.3);
    }

    .footer {
      margin-top: 20px;
      font-size: 12px;
      color: #94a3b8;
    }
  </style>
</head>

<body>

  <div class="card">
    <h1>Idrissa SALL</h1>
    <p>CV professionnel</p>

    <a href="CV_IdrissaSALL.pdf" target="_blank" class="btn">
      📄 Télécharger mon CV
    </a>

    <div class="footer">
      © 2026 - Tous droits réservés
    </div>
  </div>

</body>
</html>
